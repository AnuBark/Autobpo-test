version: '3.9'

services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: bpo_test
      POSTGRES_USER: bpo_user
      POSTGRES_PASSWORD: bpo_password
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine

  rabbitmq:
    image: rabbitmq:3-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest

  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      ClientsConnection: "Host=postgres;Database=bpo_test;Username=bpo_user;Password=bpo_password"
      RedisConnection: "redis:6379"
      RabbitMQHost: "rabbitmq"
      RabbitMQUser: "guest"
      RabbitMQPassword: "guest"
      PublicUrl: "https://your-app.up.railway.app"
      JwtSecret: "super-secret-jwt-key-for-testing-only-32-chars-min"
      PayFastMerchantId: "10004002"
      PayFastMerchantKey: "q1cd2rdny4a53"
      PayFastPassphrase: "payfast"
    depends_on:
      - postgres
      - redis
      - rabbitmq

volumes:
  postgres_data:
